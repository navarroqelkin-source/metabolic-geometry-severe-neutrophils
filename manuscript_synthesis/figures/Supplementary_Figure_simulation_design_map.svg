<text x="40" y="484" font-size="11" fill="#475569">• Burden-only (M0) resolves nothing — confirms the central point.</text>
<text x="40" y="502" font-size="11" fill="#475569">• Different breakers resolve different ambiguities; formation does not resolve detectability (A2, M1=0).</text>
<text x="40" y="520" font-size="11" fill="#475569">• Blind spots: viability (A4) and functional execution (A5) are unresolved unless measured directly (M4, M5).</text>
<text x="40" y="538" font-size="11" fill="#475569">• Even the combined panel (M7) misses A4 — no single design resolves the full latent space.</text>
<text x="40" y="556" font-size="11" fill="#475569">• Failure mode: the time-course breaker (M3) degrades under high observation noise (score 1.00 to ~0.8).</text>
<text x="489.0" y="604" text-anchor="middle" font-size="10" fill="#94a3b8">Supplementary · in silico measurement-design identifiability map · synthetic illustration of method/design behaviour, not a result; not biological parameters, not clinical claims.</text>
