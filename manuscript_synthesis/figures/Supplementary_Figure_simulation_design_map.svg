<svg viewBox="0 0 978 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
<title id="t">In silico measurement-design identifiability map</title>
<desc id="d">Ambiguity-reduction score (0 indistinguishable from burden alone, 1 resolved) for each measurement breaker against each ambiguity, under known latent truth. Burden-only resolves nothing; different breakers resolve different ambiguities; viability and function are blind spots unless measured directly. Synthetic illustration of method/design behaviour, not a result.</desc>
