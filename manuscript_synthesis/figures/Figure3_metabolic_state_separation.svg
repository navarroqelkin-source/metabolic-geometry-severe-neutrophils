<!-- SUPERSEDED FOR CROSS-PAIR ORDERING. This figure's panel b asserts a severity-ordered
     separation, Control-Severe as largest, and agreement between MMD and energy distance.
     All three are WITHDRAWN. The accessible <desc> text below also carries the claim and is
     announced by screen readers. Not deleted and not rebuilt: preserved for traceability
     pending an independent metric audit.
     See NOTICE_SCIENTIFIC_SUPERSESSION_2026-07-19.md -->
<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">A separable metabolic state across COVID-19 severity</title>
  <desc id="d">Human neutrophil metabolome (Li_ST002477). Left: Control, Mild and Severe occupy distinguishable metabolic states (point positions illustrative; the separation is the measured result). Right: maximum mean discrepancy and energy distance are permutation-significant (p approximately 0.001) for all three comparisons and severity-ordered, largest between Control and Severe.</desc>

  <rect x="0" y="0" width="1000" height="560" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">A separable metabolic state across COVID-19 severity</text>
  <text x="500" y="53" text-anchor="middle" font-size="12.5" fill="#6b7280">Human neutrophil metabolome (Li_ST002477) · 287 metabolites × 75 samples · Control 19 / Mild 30 / Severe 26</text>

  <!-- ===== Left panel: state separation (schematic positions) ===== -->
  <g>
    <text x="70" y="92" font-size="13.5" font-weight="700" fill="#334155">a · Severity groups occupy distinguishable metabolic states</text>
    <rect x="70" y="104" width="430" height="380" rx="8" fill="#fcfcfd" stroke="#e5e7eb"/>
    <text x="285" y="470" text-anchor="middle" font-size="10.5" font-weight="700" fill="#64748b">schematic state-space illustration — not PCA/UMAP coordinates</text>
    <text x="285" y="486" text-anchor="middle" font-size="10" fill="#94a3b8">illustrative geometry; measured statistics shown in panel b</text>

    <!-- Control cluster (low-left) -->
    <ellipse cx="180" cy="370" rx="62" ry="46" fill="#a7f3d0" opacity="0.30"/>
    <g fill="#10b981">
      <circle cx="165" cy="360" r="5"/><circle cx="190" cy="380" r="5"/><circle cx="200" cy="350" r="5"/>
      <circle cx="150" cy="385" r="5"/><circle cx="178" cy="345" r="5"/><circle cx="210" cy="375" r="5"/>
      <circle cx="160" cy="400" r="5"/>
    </g>
    <text x="180" y="440" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065f46">Control</text>

    <!-- Mild cluster (middle) -->
    <ellipse cx="285" cy="270" rx="64" ry="50" fill="#5eead4" opacity="0.28"/>
    <g fill="#0d9488">
      <circle cx="270" cy="260" r="5"/><circle cx="300" cy="280" r="5"/><circle cx="310" cy="250" r="5"/>
      <circle cx="255" cy="285" r="5"/><circle cx="288" cy="245" r="5"/><circle cx="320" cy="275" r="5"/>
      <circle cx="265" cy="300" r="5"/><circle cx="295" cy="305" r="5"/>
    </g>
    <text x="285" y="210" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0f766e">Mild</text>

    <!-- Severe cluster (upper-right) -->
    <ellipse cx="400" cy="190" rx="66" ry="50" fill="#2dd4bf" opacity="0.30"/>
    <g fill="#0f766e">
      <circle cx="385" cy="180" r="5"/><circle cx="415" cy="200" r="5"/><circle cx="425" cy="170" r="5"/>
      <circle cx="370" cy="205" r="5"/><circle cx="403" cy="165" r="5"/><circle cx="435" cy="195" r="5"/>
      <circle cx="380" cy="220" r="5"/>
    </g>
    <text x="400" y="150" text-anchor="middle" font-size="12.5" font-weight="700" fill="#134e4a">Severe</text>

    <!-- severity direction arrow -->
    <line x1="170" y1="378" x2="408" y2="196" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#a2)"/>
    <defs>
      <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
      </marker>
    </defs>
    <text x="300" y="300" font-size="10.5" fill="#64748b" transform="rotate(-37 300 300)">increasing severity</text>
  </g>

  <!-- ===== Right panel: test statistics (measured) ===== -->
  <g>
    <text x="540" y="92" font-size="13.5" font-weight="700" fill="#334155">b · Distributional separation is significant and severity-ordered</text>
    <rect x="540" y="104" width="390" height="380" rx="8" fill="#fcfcfd" stroke="#e5e7eb"/>

    <!-- bars: relative separation distance (Control-Severe > Control-Mild > Mild-Severe) -->
    <g>
      <!-- baseline -->
      <line x1="700" y1="180" x2="700" y2="420" stroke="#e5e7eb" stroke-width="1"/>
      <!-- Control-Severe -->
      <text x="690" y="205" text-anchor="end" font-size="11" fill="#475569">Control–Severe</text>
      <rect x="700" y="192" width="200" height="24" rx="4" fill="#0f766e"/>
      <text x="908" y="209" font-size="10.5" fill="#0f766e">p≈0.001</text>
      <!-- Control-Mild -->
      <text x="690" y="265" text-anchor="end" font-size="11" fill="#475569">Control–Mild</text>
      <rect x="700" y="252" width="150" height="24" rx="4" fill="#14b8a6"/>
      <text x="858" y="269" font-size="10.5" fill="#0f766e">p≈0.001</text>
      <!-- Mild-Severe -->
      <text x="690" y="325" text-anchor="end" font-size="11" fill="#475569">Mild–Severe</text>
      <rect x="700" y="312" width="96" height="24" rx="4" fill="#5eead4"/>
      <text x="804" y="329" font-size="10.5" fill="#0f766e">p≈0.001</text>
    </g>
    <text x="700" y="372" font-size="11" fill="#475569">→ severity-ordered distributional separation (MMD &amp; energy distance)</text>
    <text x="560" y="404" font-size="10.5" fill="#6b7280">Both tests agree 3/3 · bandwidths 0.5–4 · 1000 permutations</text>
    <text x="560" y="422" font-size="10.5" fill="#6b7280">Stable to leave-one-out · ordered Control–Severe &gt; Control–Mild &gt; Mild–Severe</text>
    <text x="560" y="452" font-size="10.5" font-style="italic" fill="#10b981">Measured result. Interpretive limit: metabolic state, not flux.</text>
  </g>

  <!-- Footer -->
  <line x1="70" y1="506" x2="930" y2="506" stroke="#e5e7eb" stroke-width="1"/>
  <text x="500" y="527" text-anchor="middle" font-size="11" fill="#6b7280">Bar lengths summarize the observed ordering of MMD and energy-distance results; they are not a new metric. Permutation-based p≈0.001 for all pairwise comparisons.</text>
  <text x="500" y="546" text-anchor="middle" font-size="10.5" fill="#94a3b8">Figure 3 · measured result = the distributional separation · no flux, no causal claim, no clinical prediction</text>
<g id="supersession-banner"><rect x="0.0" y="0.0" width="1000.0" height="42.0" fill="#cc1a1a"/><text x="500.0" y="17.64" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14.3" font-weight="700" fill="#ffffff">SUPERSEDED - DO NOT USE FOR CROSS-PAIR ORDERING</text><text x="500.0" y="32.76" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9.2" fill="#ffe8e8">Independent metric audit pending - see NOTICE_SCIENTIFIC_SUPERSESSION_2026-07-19.md</text></g>
</svg>
