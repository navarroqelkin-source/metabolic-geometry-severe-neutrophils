<svg viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">A two-layer observation model for NET burden</title>
  <desc id="d">Process layer: formation F feeds the NET-burden stock B, removed at rate k (degradation plus clearance; persistence equals one over k); steady state B-star equals F over k, so a single scalar burden identifies only F/k, not F and k. Observation layer: the measured signal Y equals K_R times B plus noise, a second stacked source of non-identifiability. An observation model, not a clinical or patient-calibrated model.</desc>

  <rect x="0" y="0" width="1000" height="640" fill="#ffffff"/>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="arA" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#b45309"/></marker>
  </defs>

  <text x="500" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">A two-layer observation model for NET burden</text>
  <text x="500" y="53" text-anchor="middle" font-size="12.5" fill="#6b7280">Why a single accumulated stock cannot identify the flows that generate it — two stacked sources of non-identifiability</text>

  <!-- ===== Layer 1: process ===== -->
  <rect x="50" y="74" width="900" height="190" rx="10" fill="#fbfbfd" stroke="#cbd5e1"/>
  <text x="66" y="96" font-size="12.5" font-weight="700" fill="#334155">1 · Process layer — the stock and its flows</text>

  <!-- formation in -->
  <text x="150" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">F</text>
  <text x="150" y="176" text-anchor="middle" font-size="10.5" fill="#64748b">formation</text>
  <text x="150" y="190" text-anchor="middle" font-size="10.5" fill="#64748b">(in-flow)</text>
  <line x1="186" y1="150" x2="300" y2="150" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- stock B -->
  <rect x="300" y="118" width="150" height="64" rx="8" fill="#eef2f7" stroke="#94a3b8" stroke-width="2"/>
  <text x="375" y="146" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">B</text>
  <text x="375" y="166" text-anchor="middle" font-size="10" fill="#64748b">latent NET burden (stock)</text>

  <!-- removal out -->
  <line x1="450" y1="150" x2="566" y2="150" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="612" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">k = D + C</text>
  <text x="612" y="164" text-anchor="middle" font-size="10.5" fill="#64748b">removal (out-flow):</text>
  <text x="612" y="178" text-anchor="middle" font-size="10.5" fill="#64748b">degradation + clearance</text>
  <text x="612" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">persistence = 1/k</text>

  <!-- equation + non-identifiability -->
  <rect x="710" y="104" width="222" height="92" rx="8" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="821" y="128" text-anchor="middle" font-size="13" fill="#475569">dB/dt = F − kB</text>
  <text x="821" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">B* = F/k</text>
  <text x="821" y="172" text-anchor="middle" font-size="9.5" fill="#92400e">one scalar B identifies F/k,</text>
  <text x="821" y="185" text-anchor="middle" font-size="9.5" font-weight="700" fill="#92400e">not F and k separately</text>
  <text x="500" y="230" text-anchor="middle" font-size="11" fill="#475569">excess formation (high F) and impaired removal (low k) are <tspan font-weight="700" fill="#b45309">observationally equivalent</tspan> at a single time point</text>
  <text x="500" y="250" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">steady state is the most favourable case; the realistic non-stationary case (acute COVID-19 / sepsis transients) is strictly worse</text>

  <!-- nesting arrow -->
  <line x1="375" y1="264" x2="375" y2="300" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="3 3" marker-end="url(#ar)"/>
  <text x="392" y="288" font-size="10" fill="#94a3b8">B is never observed directly</text>

  <!-- ===== Layer 2: observation ===== -->
  <rect x="50" y="306" width="900" height="150" rx="10" fill="#fbfbfd" stroke="#cbd5e1"/>
  <text x="66" y="328" font-size="12.5" font-weight="700" fill="#334155">2 · Observation layer — the measured signal</text>

  <rect x="300" y="350" width="150" height="56" rx="8" fill="#eef2f7" stroke="#94a3b8" stroke-width="2"/>
  <text x="375" y="375" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">B</text>
  <text x="375" y="394" text-anchor="middle" font-size="9.5" fill="#64748b">(same latent stock)</text>

  <line x1="450" y1="378" x2="566" y2="378" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="508" y="368" text-anchor="middle" font-size="11" fill="#64748b">× K_R , + ε</text>

  <rect x="566" y="350" width="150" height="56" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/>
  <text x="641" y="375" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">Y</text>
  <text x="641" y="394" text-anchor="middle" font-size="9.5" fill="#92400e">measured biomarker</text>

  <text x="760" y="368" font-size="11" fill="#475569">Y = K_R·B + ε</text>
  <text x="760" y="386" font-size="10" fill="#64748b">K_R = detectability,</text>
  <text x="760" y="400" font-size="10" fill="#64748b">ε = measurement noise</text>
  <text x="500" y="436" text-anchor="middle" font-size="11" fill="#475569">a <tspan font-weight="700" fill="#b45309">second, stacked</tspan> source of non-identifiability: even a known B need not be faithfully reflected in Y</text>

  <!-- ===== Measurement breakers strip ===== -->
  <text x="66" y="488" font-size="12.5" font-weight="700" fill="#334155">Measurement breakers — what to co-measure to make a mechanism identifiable (design requirements, not demonstrated mechanisms)</text>
  <g font-size="10" fill="#334155">
    <rect x="60" y="500" width="170" height="40" rx="6" fill="#ecfeff" stroke="#a5f3fc"/><text x="145" y="518" text-anchor="middle">formation assay +</text><text x="145" y="531" text-anchor="middle">serum degradation assay</text>
    <rect x="242" y="500" width="150" height="40" rx="6" fill="#ecfeff" stroke="#a5f3fc"/><text x="317" y="518" text-anchor="middle">time-course /</text><text x="317" y="531" text-anchor="middle">decay design</text>
    <rect x="404" y="500" width="160" height="40" rx="6" fill="#ecfeff" stroke="#a5f3fc"/><text x="484" y="518" text-anchor="middle">PTM-rate / enzyme</text><text x="484" y="531" text-anchor="middle">activity + total material</text>
    <rect x="576" y="500" width="170" height="40" rx="6" fill="#ecfeff" stroke="#a5f3fc"/><text x="661" y="518" text-anchor="middle">paired functional</text><text x="661" y="531" text-anchor="middle">NET-formation readout</text>
    <rect x="758" y="500" width="174" height="40" rx="6" fill="#ecfeff" stroke="#a5f3fc"/><text x="845" y="518" text-anchor="middle">paired metabolic +</text><text x="845" y="531" text-anchor="middle">functional (perturbation)</text>
  </g>

  <!-- Footer -->
  <line x1="50" y1="572" x2="950" y2="572" stroke="#e5e7eb" stroke-width="1"/>
  <text x="500" y="594" text-anchor="middle" font-size="10.5" fill="#64748b">Adding latent processes without adding measurements cannot resolve the ambiguity — only preserve or worsen it; the remedy is to measure more, not to model more.</text>
  <text x="500" y="614" text-anchor="middle" font-size="10.5" fill="#94a3b8">Figure 2 · an observation model, not a clinical or patient-calibrated model · synthetic illustrative trajectories are supplementary only</text>
</svg>
